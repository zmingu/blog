[params.mermaid]
cdn = ""          # Mermaid 核心库 CDN 地址 (留空使用默认 jsdelivr 源)

zenuml = ""       # ZenUML 插件 CDN 地址 (留空不启用，用于支持 ZenUML 语法) e.g. https://cdn.jsdelivr.net/npm/@mermaid-js/mermaid-zenuml/dist/mermaid-zenuml.esm.min.mjs

# For values, see https://mermaid.js.org/config/theming.html#available-themes
themes = [        # Mermaid 主题设置，数组第一个对应博客的"浅色模式"，第二个对应"深色模式"
  "default",
  "dark"
]

securityLevel = "loose" # 安全级别 (建议 "loose"，允许在图表中使用 HTML 标签)["strict", "loose", "antiscript", "sandbox"]
ook = "handDrawn" # 图表外观风格 ["classic"(经典工整), "handDrawn"(手绘草图风)]，强烈推荐 handDrawn！
fontFamily = ""   # 图表字体 (留空跟随网页字体)

# FixIt 0.4.0 | NEW Layout loaders from ESM module CDN sources (e.g., ELK layout engine)
# Example: ["https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk/dist/mermaid-layout-elk.esm.min.mjs"]
# This will enable additional layout options: ["elk", "elk.layered", "elk.stress", "elk.force", "elk.mrtree"]
layoutLoaders = [] # 额外的布局加载器 (如需使用 ELK 布局引擎需在此配置 CDN)

# Default layout algorithm for rendering diagrams
# Available options: "dagre" (default), "elk", "elk.layered", "elk.stress", "elk.force", "elk.mrtree"
# Note: ELK layouts require layoutLoaders to be configured first
layout = "dagre"   # 默认布局算法 ["dagre"(默认), "elk"(需先配置 loader)]

# 自定义 Admonition 警告框图标
# See https://fixit.lruihao.cn/documentation/content-management/shortcodes/extended/admonition/#custom-admonitions
# syntax: <type> = <icon>
[params.admonition]
# ban = "fa-solid fa-ban" # 自定义示例: 将 ban 类型的图标改为禁止符号

# 自定义任务列表图标
# See https://fixit.lruihao.cn/documentation/content-management/advanced/#custom-task-lists
# syntax: <sign> = <icon>
[params.taskList]
# tip = "fa-regular fa-lightbulb" # 自定义示例: 将 [tip] 标记的任务显示为灯泡图标

# 版本号短代码配置
[params.repoVersion]
url = "https://github.com/hugo-fixit/FixIt/releases/tag/v" # 版本发布的 URL 前缀

name = "FixIt" # 项目名称 (使用 version shortcode 时显示的默认名字)

# 盘古之白: 中英文自动空格
[params.pangu]
enable = true   # 是否开启 PanguJS (强烈建议 true，自动在汉字和英文/数字之间加空格，排版更舒服)
selector = "article" # 应用 PanguJS 的区域 (默认 "article" 只处理文章内容)

# 全站水印配置
# Detail config see https://github.com/Lruihao/watermark#readme
[params.watermark]
enable = false   # 是否开启水印 (用于防盗或内部文档，通常设为 false)
content = ""     # 水印文字内容 (支持 HTML，例如 "仅供内部交流")
opacity = 0.1    # 水印透明度 (0-1，数值越小越淡)
width = 150      # 单个水印宽度 (px)
height = 20      # 单个水印高度 (px)
rowSpacing = 60  # 水印行间距
colSpacing = 30  # 水印列间距
rotate = 15      # 水印旋转角度
fontSize = 0.85  # 水印字体大小
fontFamily = "inherit" # 水印字体 (inherit 表示跟随网页字体)

# 不蒜子访问统计
[params.busuanzi]
enable = true   # 是否开启统计 (建议 true，无需后端即可统计阅读量)
source = "https://vercount.one/js" # 统计脚本源 (推荐使用 vercount.one，比原版 busuanzi 更稳定且支持 https)
siteViews = true # 是否在页脚显示站点总访问量/访客数
pageViews = true # 是否在文章标题下方显示单篇阅读量

# 各大搜索引擎站长验证配置 Google/Bing/Yandex/Pinterest/Baidu/360/Sogou
[params.verification]
google = "hFCpSpo_q4f6gjMJKLjgPpdaVIc8n08YKsRUvej7870"      # Google Search Console 验证码 (meta 标签 content 里的值)
bing = ""        # Bing 必应站长验证码
yandex = ""      # Yandex 验证码
pinterest = ""   # Pinterest 验证码
baidu = ""       # 百度站长平台验证码
so = ""          # 360 搜索验证码
sogou = ""       # 搜狗搜索验证码

# 全局 SEO 配置
[params.seo]
image = "/images/avatar.webp"       # 网站默认 SEO 预览图 (当文章没有封面时，分享到社交媒体显示的图片)
thumbnailUrl = "" # 缩略图 URL (通常留空，自动生成)

# 网站流量分析配置
[params.analytics]
enable = true   # 是否开启分析统计 (填好下方 ID 后记得改为 true)

# 谷歌分析 GA4
[params.analytics.google]
id = ""          # 衡量 ID (格式通常为 G-XXXXXXXXXX)
anonymizeIP = true # 是否匿名化 IP (GDPR 要求，建议 true)

# 注重隐私的付费统计服务 Fathom
[params.analytics.fathom]
id = ""          # Fathom 站点 ID
server = ""      # 如果是自托管 Fathom，填服务器地址

# 百度统计
[params.analytics.baidu]
id = ""          # 百度统计 ID (注意：只填 hm.js? 后面那串字符，不是整段脚本)

# 开源、隐私友好的统计 Umami
[params.analytics.umami]
data_website_id = "" # Umami 网站 ID (UUID 格式)
src = ""         # 统计脚本地址 (例如 "https://analytics.umami.is/script.js")
data_host_url = "" # 数据发送地址 (通常留空)
data_domains = "" # 限制统计的域名 (逗号分隔)

# Plausible 轻量级隐私统计
[params.analytics.plausible]
data_domain = "" # 统计域名 (你的博客域名)
src = ""         # 脚本地址 (例如 "https://plausible.io/js/script.js")

# Cloudflare Analytics (推荐：免费且无需额外脚本)
[params.analytics.cloudflare]
token = ""       # Cloudflare Web Analytics Token (如果你使用了 CF 的 CDN，这里通常不需要填)

# Splitbee Analytics
[params.analytics.splitbee]
enable = false   # 是否开启 Splitbee
no_cookie = true # 无 Cookie 模式 (更隐私)
do_not_track = true # 遵守浏览器的"不追踪"设置
data_token = ""  # Splitbee Token,more info on https://splitbee.io/docs/embed-the-script

# Cookie 许可横幅，GDPR 合规用
[params.cookieconsent]
enable = false    # 是否在页面底部显示 Cookie 同意横幅 (如果不针对欧盟用户，可设为 false)

# text strings used for Cookie consent banner
[params.cookieconsent.content]
message = ""
dismiss = ""
link = ""

# CDN config for third-party library files (第三方库文件的 CDN 配置)
[params.cdn]
# CDN data file name, disabled by default ["jsdelivr.yml", "unpkg.yml", ...]
# located in "themes/FixIt/assets/data/cdn/" directory
# you can store your own data files in the same path under your project: "assets/data/cdn/"
data = "zstatic.yml"  # 自定义 CDN 配置，优先使用字节跳动 zstatic（国内快）

# Compatibility config (兼容性配置)
[params.compatibility]
# https://cdnjs.cloudflare.com/polyfill
polyfill = false # 是否使用 cdnjs 上的 Polyfill.io 以兼容旧版浏览器
objectFit = false # 是否使用 object-fit-images 以兼容旧版浏览器

# FixIt 0.2.14 | NEW GitHub banner in the top-right or top-left corner (GitHub 悬挂角标)
[params.githubCorner]
enable = false   # 是否开启 GitHub 角标 (在页面角落显示一个 "Fork me on GitHub" 的飘带)
permalink = "https://github.com/zmingu" # GitHub 仓库的永久链接
title = "View source on GitHub" # 鼠标悬停时显示的标题
position = "right" # 角标位置 ["left", "right"]

# FixIt 0.2.14 | NEW Gravatar config (Gravatar 头像配置)
[params.gravatar]
enable = false   # 是否启用 Gravatar (依赖作者邮箱，若未设置作者邮箱则使用本地头像)
host = "www.cravatar.cn" # Gravatar 主机，默认: "www.gravatar.com" (国内推荐用 "cravatar.cn")
style = ""       # 头像风格 ["", "mp", "identicon", "monsterid", "wavatar", "retro", "blank", "robohash"]

# FixIt 0.2.16 | NEW Back to top (返回顶部按钮)
[params.backToTop]
enable = true    # 是否开启返回顶部按钮
scrollpercent = true # 是否在返回顶部按钮周围显示滚动百分比

# FixIt 0.2.16 | NEW Reading progress bar (阅读进度条)
[params.readingProgress]
enable = true   # 是否开启阅读进度条 (固定在页面顶部或底部的线条，随阅读进度变长)
# Available values: ["left", "right"]
start = "left"   # 起始位置 ["left"(从左到右), "right"(从右到左)]
# Available values: ["top", "bottom"]
position = "top" # 显示位置 ["top"(顶部), "bottom"(底部)]
reversed = false # 是否反转方向
light = ""       # 浅色模式下的颜色 (留空使用主题默认色)
dark = ""        # 深色模式下的颜色
height = "2px"   # 进度条高度 (例如 "2px")

# FixIt 0.2.17 | NEW Progress bar in the top during page loading. (页面加载进度条)
# For more information: https://github.com/CodeByZach/pace
[params.pace]
enable = false   # 是否开启页面加载进度条
# All available colors:
# ["black", "blue", "green", "orange", "pink", "purple", "red", "silver", "white", "yellow"]
color = "blue"   # 进度条颜色
# All available themes:
# ["barber-shop", "big-counter", "bounce", "center-atom", "center-circle", "center-radar", "center-simple",
# "corner-indicator", "fill-left", "flash", "flat-top", "loading-bar", "mac-osx", "material", "minimal"]
theme = "minimal" # 进度条主题样式 (推荐 minimal 极简风)

# FixIt 0.3.17 | NEW PostChat AI config (PostChat AI 对话配置)
# Based on your posts to build a knowledge base, support AI summary, AI search, and AI Chatbot.
# Get PostChat Key from my invitation link, thanks for your support!
# https://ai.zhheo.com/console/login?InviteID=85041330
[params.postChat]
enable = false   # 是否开启 PostChat AI 功能
key = ""         # PostChat API Key (需要去官网申请)
# How users initiate chats: ["iframe", "magic"]
userMode = "iframe" # 用户发起聊天的方式 ["iframe"(嵌入式), "magic"(魔法模式)]
addButton = true # 是否添加聊天按钮
defaultInput = false # 是否开启默认输入
left = ""        # 自定义按钮左边距
bottom = ""      # 自定义按钮下边距
width = ""       # 自定义宽度
height = ""      # 自定义高度
fill = ""        # 填充颜色
backgroundColor = "" # 背景颜色
upLoadWeb = true # 是否允许上传网页内容到 AI 知识库
showInviteLink = true # 是否显示邀请链接
userTitle = ""   # 用户标题
userDesc = ""    # 用户描述
# dom container to be blacked out, e.g. [".aplayer"]
blackDom = []    # 需要被遮罩遮挡的 DOM 元素选择器
# Only for iframe mode
frameWidth = ""  # iframe 模式下的宽度 (例如 "375px")
frameHeight = "" # iframe 模式下的高度 (例如 "600px")
# only for magic mode
userIcon = ""    # magic 模式下的用户图标
defaultChatQuestions = [] # 默认聊天问题列表
defaultSearchQuestions = [] # 默认搜索问题列表
# FixIt 0.4.0 | NEW
hotWords = true  # 是否启用热词推荐

# FixIt 0.3.17 | NEW Summary AI config (文章 AI 摘要配置)
# See https://ai.zhheo.com/docs/summary.html
[params.postSummary]
enable = false   # 是否开启 AI 文章摘要
# If you set `params.postChat.key`, you don't need to set `params.postSummary.key`
key = ""         # API Key (如果你设置了上面的 postChat.key，这里不需要重复填)
title = ""       # 摘要卡片的标题
# themes options: ["", "simple", "yanzhi"]
theme = ""       # 摘要主题 ["simple"(简约), "yanzhi"(高颜值)]
postURL = ""     # 文章链接前缀
blacklist = ""   # 黑名单 (不生成摘要的文章 ID 或链接)
wordLimit = 1000 # 字数限制 (超过此字数的文章才生成摘要)
typingAnimate = true # 是否开启打字机动画效果
beginningText = "" # 摘要开头的固定文字
loadingText = true # 是否显示加载中的提示文字

# FixIt 0.3.10 | NEW Global Feed config (全局 RSS/Atom/JSON 订阅配置)
[params.feed]
limit = 10       # Feed 中包含的文章数量 (-1 代表全部，建议 10-20 篇以控制体积)
fullText = false  # Feed 中是否包含全文 (true=全文，读者体验好; false=仅摘要，防爬虫)

# Site Challenge for Follow: https://follow.is/ (Follow 平台的验证配置)
[params.feed.follow]
feedId = ""      # Follow Feed ID
userId = ""      # Follow User ID

# FixIt 0.3.17 | NEW Image config (图片优化配置)
[params.image]
cacheRemote = false # 是否缓存远程图片以进行优化 (需要 Hugo 扩展版)
optimise = false # 是否开启图片自动调整大小和优化 (构建速度会变慢，但加载更快)

# FixIt 0.4.0 | NEW JSON Viewer config (JSON 查看器配置)
# See https://github.com/Lruihao/json-viewer-element
[params.jsonViewer]
enable = true    # 是否启用 JSON 查看器 (自动美化文章中的 JSON 代码块)
expandDepth = 1  # 默认展开深度
copyable = true  # 是否显示复制按钮
sort = false     # 是否对 Key 进行排序
boxed = true     # 是否显示边框

# FixIt 0.3.12 | NEW Custom partials config (自定义模版注入配置)
# Custom partials must be stored in the /layouts/partials/ directory.
# 用于在页面特定位置插入自定义 HTML/Go 代码，无需修改主题源码
[params.customPartials]
head = ["custom/head.html"]             # 插入到 <head> 标签内
menuDesktop = []      # 插入到桌面端菜单
menuMobile = []       # 插入到移动端菜单
profile = []          # 插入到主页个人简介区
aside = []            # 插入到侧边栏
comment = []          # 插入到评论区
footer = ["custom/footer.html"]           # 插入到页脚
widgets = []          # 插入到侧边栏小部件
assets = []           # 插入自定义静态资源
postTocBefore = []    # 插入到文章目录之前
postTocAfter = []     # 插入到文章目录之后
postContentBefore = [] # 插入到文章内容之前 (如: 广告)
postContentAfter = []  # 插入到文章内容之后 (如: 打赏)
postFooterBefore = []  # 插入到文章页脚之前
postFooterAfter = []   # 插入到文章页脚之后

# FixIt 0.2.15 | NEW Developer options (开发者选项)
# Select the scope named `public_repo` to generate personal access token,
# Configure with environment variable `HUGO_PARAMS_GHTOKEN=xxx`, see https://gohugo.io/functions/os/getenv/#examples
[params.dev]
enable = false   # 是否开启开发者模式
c4u = false      # 检查主题更新 (建议 false，以免每次构建都请求 GitHub)

# Page config (文章详情页通用配置)
[params.page]
authorAvatar = true      # 是否在文章标题旁显示作者头像
hiddenFromHomePage = false # 是否从主页列表中隐藏
hiddenFromSearch = false   # 是否从搜索结果中隐藏
hiddenFromRelated = false  # 是否从相关文章推荐中隐藏
hiddenFromFeed = false     # 是否从 RSS Feed 中隐藏
twemoji = false            # 是否启用 Twemoji (Twitter 的 Emoji 样式)
lightgallery = "force"       # 图片画廊/灯箱 (建议 "force"，点击图片可全屏放大查看)
ruby = true                # 是否启用 Ruby 旁注语法 (给汉字注音用)
fraction = true            # 是否启用分数语法 (如 1/2)
fontawesome = true         # 是否启用 FontAwesome 图标支持
license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>' # 文章默认许可协议 (CC BY-NC-SA 4.0)

linkToMarkdown = true      # 是否显示 "查看 Markdown 源码" 链接

linkToSource = true        # 是否显示 "查看源代码" 链接 (跳到 GitHub)

linkToEdit = true          # 是否显示 "编辑此页" 链接 (跳到 GitHub 编辑)

linkToReport = true        # 是否显示 "报告问题" 链接 (跳到 GitHub Issues)

linkToVscode = true        # 是否显示 "在 VSCode 中打开" (仅本地开发有效，线上会自动隐藏)

pageStyle = "normal"       # 页面宽度风格 ["narrow"(窄), "normal"(标准), "wide"(宽)]

autoBookmark = false       # 自动书签 (记住阅读进度，下次打开自动跳转到上次看的地方)

wordCount = true           # 是否显示文章字数统计

readingTime = true         # 是否显示预计阅读时间

endFlag = "--- 本文完 ---"               # 文章结束标志 (如 "--- 本文完 ---")

instantPage = true        # 是否启用 instant.page (鼠标悬停链接时预加载，显著提升点击打开速度，建议 true)

collectionList = true     # 是否在侧边栏显示系列文章列表 (如果你使用系列文章功能)

collectionNavigation = true # 是否在文末显示系列文章导航

# FixIt 0.2.15 | NEW Repost config (转载文章配置)
[params.page.repost]
enable = false   # 是否启用转载声明
url = ""         # 转载原文链接 (会被文章 front matter 中的 repost 字段覆盖)

# Table of the contents config (文章目录配置 TOC)
[params.page.toc]
enable = true    # 是否显示文章目录

keepStatic = false # 是否在文章内容最前面保留一份静态目录

auto = true      # 是否自动折叠侧边栏目录

position = "right" # 目录位置 ["left", "right"]，推荐 "right" 符合阅读习惯

ordered = false  # 目录是否显示序号 (1., 2., 3.)

startLevel = 2   # 目录抓取的起始标题级别 (2 代表从 H2 开始)

endLevel = 6     # 目录抓取的结束标题级别

decreaseH1 = false # 是否自动降低内容中的 H1 级别 (防止文章内出现多个 H1 影响 SEO)

# 在文章开头显示消息，警告读者其内容可能已过期
[params.page.expirationReminder]
enable = true   # 是否开启"文章时效性"提醒 (如果文章很久没更新，提示读者内容可能过时)

reminder = 90    # 超过多少天未更新则显示"提醒"

warning = 180    # 超过多少天未更新则显示"警告"

closeComment = false # 文章过期是否自动关闭评论

# FixIt 0.3.0 | NEW page heading config (标题配置)
[params.page.heading]
capitalize = false # 是否自动大写标题中的英文

# FixIt 0.3.12 | CHANGED must set `params.page.toc.ordered` to true
[params.page.heading.number]
enable = false   # 是否开启正文标题自动编号 (如 1. 引言, 1.1 背景)
onlyMainSection = true # 仅在主要文章分类中启用

[params.page.heading.number.format]
h1 = "{title}"   # H1 格式 (通常文章标题是 H1，所以这里不加序号)
h2 = "{h2} {title}" # H2 格式 (如 1. 标题)
h3 = "{h2}.{h3} {title}" # H3 格式 (如 1.1 标题)
h4 = "{h2}.{h3}.{h4} {title}"
h5 = "{h2}.{h3}.{h4}.{h5} {title}"
h6 = "{h2}.{h3}.{h4}.{h5}.{h6} {title}"

#  数学公式配置
# See http://fixit.lruihao.cn/documentation/content-management/markdown-syntax/extended/#formula
[params.page.math]
enable = true    # 是否启用数学公式支持 (建议 true，主题会自动检测文章内是否有公式才加载脚本)

type = "katex"   # 渲染引擎 ["katex"(速度快, 推荐), "mathjax"(兼容性强, 但慢)]

# KaTeX server-side rendering (https://katex.org)
[params.page.math.katex]
# KaTeX extension copy-tex
copyTex = true   # 是否允许复制公式的 TeX 源码
throwOnError = false # 渲染出错时是否抛出异常 (false 则直接显示源码)
errorColor = "#ff4949" # 错误信息的颜色

# custom macros map (自定义 KaTeX 宏映射)
# syntax: <macro> = <definition>
[params.page.math.katex.macros]
# "\\f" = "#1f(#2)"   # 使用方式: $\f{a}{b}$

# MathJax server-side rendering (MathJax 服务端渲染配置)
# MathJax config: https://docs.mathjax.org/en/latest/options/index.html
[params.page.math.mathjax]
cdn = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" # MathJax CDN 链接

[params.page.math.mathjax.packages]
# "[+]" = ["configmacros"] # 自定义扩展包

# custom macros map (自定义 MathJax 宏)
# syntax: <macro> = <definition>
[params.page.math.mathjax.macros]
# "bold" = ["{\\bf #1}", 1]   # usage: $\bold{math}$
[params.page.math.mathjax.loader]
load = [ "ui/safe" ] # 加载器配置

[params.page.math.mathjax.loader.paths]
# custom = "https://cdn.jsdelivr.net/gh/sonoisa/XyJax-v3@3.0.1/build/" # 自定义加载路径
# more loader config e.g source, dependencies, provides etc.

[params.page.math.mathjax.options]
enableMenu = true    # 是否开启右键菜单
# HTML tags that won't be searched for math (不进行数学公式渲染的 HTML 标签)
skipHtmlTags = [
  "script",
  "noscript",
  "style",
  "textarea",
  "pre",
  "code",
  "math",
  "select",
  "option",
  "mjx-container"
]
# class that marks tags not to search
ignoreHtmlClass = "mathjax_ignore" # 忽略渲染的 CSS 类名

# HTML tags that can appear within math (允许出现在公式内的 HTML 标签)
[params.page.math.mathjax.options.includeHtmlTags]
# "#comment" = ""
# br = "\n"
# wbr = ""

# Code wrapper config (代码块包裹器配置)
[params.page.code]
enable = true    # 是否启用代码块包裹器 (必须开启，否则无法显示复制/折叠功能)
copy = true      # 是否显示复制代码按钮
edit = true      # 是否显示"编辑代码"按钮 (需要配置 gitInfo，点击后跳到 GitHub 对应的源码行)
maxShownLines = 15 # 代码块默认显示的最大行数 (超过此行数会自动折叠，点击展开。建议 10-20，设太大会占用过多版面)

# Mapbox GL JS config (Mapbox 地图配置)(https://docs.mapbox.com/mapbox-gl-js)
[params.page.mapbox]

accessToken = "" # Mapbox Token (需要去 mapbox.com 注册申请，否则地图无法加载)

lightStyle = "mapbox://styles/mapbox/light-v11" # 浅色模式下的地图样式

darkStyle = "mapbox://styles/mapbox/dark-v11"  # 深色模式下的地图样式

navigation = true # 是否添加导航控件 (放大/缩小)

geolocate = true  # 是否添加定位控件

scale = true      # 是否添加比例尺控件

fullscreen = true # 是否添加全屏控件

# FixIt 0.3.0 | NEW Related content config (相关文章推荐配置)
[params.page.related]
enable = true   # 是否开启相关文章推荐 (基于关键词和标签自动推荐)
count = 5        # 推荐文章的数量
# FixIt 0.3.20 | NEW position of related content, optional values: ["aside", "footer"]
position = [     # 相关文章显示的位置
  "aside",       # 侧边栏 (目录下方)
  "footer"       # 文章底部 (评论区上方)
]

# FixIt 0.2.17 | NEW Donate (Sponsor) settings (打赏/赞赏配置)
[params.page.reward]
enable = false   # 是否开启打赏功能
animation = false # 是否开启打赏按钮动画 (吸引眼球)
# position relative to post footer, optional values: ["before", "after"]
position = "after" # 打赏区域位置 ["before"(页脚前), "after"(页脚后)]
# comment = "Buy me a coffee" # 打赏提示语 (如: "请我喝杯咖啡")
# FixIt 0.2.18 | NEW display mode of QR code images, optional values: ["static", "fixed"], default: `static`
mode = "static"  # 二维码显示模式 ["static"(图片平铺), "fixed"(鼠标悬停时显示)]

[params.page.reward.ways]
# wechatpay = "/images/wechatpay.png" # 微信支付二维码路径 (放在 static 目录下)
# alipay = "/images/alipay.png"       # 支付宝二维码路径
# paypal = "/images/paypal.png"       # PayPal 图片路径
# bitcoin = "/images/bitcoin.png"     # 比特币图片路径

# social share links in post page (文章底部的社交分享按钮)
[params.page.share]
enable = true    # 是否开启文章分享功能
Twitter = true   # Twitter 分享
Facebook = true  # Facebook 分享
Linkedin = false # LinkedIn 分享
Whatsapp = false
Pinterest = false
Tumblr = false
HackerNews = false
Reddit = false
VK = false
Buffer = false
Xing = false
Line = false
Instapaper = false
Pocket = false
Flipboard = false
Weibo = true     # 微博分享 (建议开启)
Myspace = false
Blogger = false
Baidu = false
Odnoklassniki = false
Evernote = false
Skype = false
Trello = false
Mix = false

# FixIt 0.2.15 | CHANGED Comment config (评论系统配置)
[params.page.comment]
enable = true   # 是否开启评论系统 (注意：具体的评论服务提供商需要在下方配置)

# FixIt 0.2.13 | NEW Artalk comment config (Artalk 评论系统，需自建后端)
# https://artalk.js.org/
[params.page.comment.artalk]
enable = false   # 是否开启 Artalk
server = "https://yourdomain" # Artalk 后端服务器地址
site = "默认站点" # Artalk 后台中设置的站点名称
# FixIt 0.3.3 | NEW whether use backend configuration
useBackendConf = false # 是否直接使用后端配置 (建议 false，在前端控制更灵活)
placeholder = "" # 评论框占位符
noComment = ""   # 无评论时的提示
sendBtn = ""     # 发送按钮文字
editorTravel = true # 移动端编辑器是否跟随底部
flatMode = "auto" # 评论嵌套模式 ["auto", "flat", "nested"]
# FixIt 0.2.17 | CHANGED enable lightgallery support
lightgallery = false # 是否启用图片灯箱
locale = ""      # FixIt 0.2.15 | NEW 语言设置 (如 "zh-CN")
# FixIt 0.2.18 | NEW
emoticons = ""   # 表情包配置
nestMax = 2      # 最大嵌套层数
nestSort = "DATE_ASC" # 嵌套评论排序 ["DATE_ASC", "DATE_DESC", "VOTE_UP_DESC"]
vote = true      # 是否允许点赞
voteDown = false # 是否允许踩
uaBadge = true   # 是否显示用户 UA 信息 (浏览器/系统)
listSort = true  # 是否允许用户切换排序方式
imgUpload = true # 是否允许上传图片
preview = true   # 是否开启预览
versionCheck = true # 是否检查版本更新

# Disqus comment config (Disqus 评论，老牌但有广告，不推荐国内使用)
# https://disqus.com
[params.page.comment.disqus]
enable = false   # 是否开启 Disqus
# Disqus shortname to use Disqus in posts
shortname = ""   # 你的 Disqus Shortname

# Gitalk comment config (Gitalk 评论，基于 GitHub Issue)
# https://github.com/gitalk/gitalk
[params.page.comment.gitalk]
enable = false   # 是否开启 Gitalk
owner = ""       # GitHub 用户名
repo = ""        # 用于存储评论的 GitHub 仓库名
clientId = ""    # GitHub OAuth App Client ID
clientSecret = "" # GitHub OAuth App Client Secret

# Valine comment config (Valine 评论，基于 LeanCloud，快速但隐私性一般)
# https://github.com/xCss/Valine
[params.page.comment.valine]
enable = false   # 是否开启 Valine
appId = ""       # LeanCloud AppId
appKey = ""      # LeanCloud AppKey
placeholder = "" # 评论框占位符
avatar = "mp"    # 头像风格
meta = ['nick', 'mail', 'link'] # 必填字段
requiredFields = [] # 必填字段校验
pageSize = 10    # 每页评论数
lang = ""        # 语言
visitor = true   # 是否开启阅读量统计 (文章浏览量)
recordIP = true  # 是否记录评论者 IP
highlight = true # 代码高亮
enableQQ = false # 是否开启 QQ 头像自动抓取
serverURLs = ""  # 你的 LeanCloud 自定义域名 (重要：现在 LeanCloud 强制要求绑定域名)
# emoji data file name, default is "google.yml"
# ["apple.yml", "google.yml", "facebook.yml", "twitter.yml"]
# located in "themes/FixIt/assets/lib/valine/emoji/" directory
# you can store your own data files in the same path under your project:
# "assets/lib/valine/emoji/"
emoji = "" # 情包路径 (默认在 themes/FixIt/assets/lib/valine/emoji/)
commentCount = true # 是否统计评论数

# FixIt 0.2.16 | CHANGED Waline comment config (Waline 评论，Valine 的升级版，功能最强)
# https://waline.js.org
[params.page.comment.waline]
enable = true  # 是否开启 Waline (强烈推荐国内用户使用)
serverURL = "https://waline.zmingu.com"   # Waline 服务端地址 (通常部署在 Vercel)
pageview = true # 是否开启页面浏览量统计
emoji = [ "//unpkg.com/@waline/emojis@1.1.0/weibo" ] # 表情包预设
meta = ["nick", "mail", "link"] # 评论者信息字段
requiredMeta = [] # 必填字段
login = "enable" # 登录模式 ["enable"(开启), "disable"(关闭), "force"(强制)]
wordLimit = 0    # 字数限制
pageSize = 10    # 每页显示条数
imageUploader = false # 是否开启图片上传
highlighter = true # 是否开启代码高亮
comment = true  # 是否显示评论数统计
texRenderer = false # 是否开启数学公式渲染
search = false   # 是否允许搜索评论
recaptchaV3Key = "" # Google reCAPTCHA v3 Key
turnstileKey = "" # Cloudflare Turnstile Key (人机验证)
reaction = true # 是否开启表情互动 (类似 GitHub 的 reaction)

# Facebook comment config (Facebook 评论插件)
[params.page.comment.facebook]
enable = false   # 是否开启 Facebook 评论
width = "100%"   # 宽度
numPosts = 10    # 显示评论数
appId = ""       # Facebook App ID
languageCode = "" # 语言代码 (如 zh_CN)

# Telegram comments config (Telegram 评论)
[params.page.comment.telegram]
enable = false   # 是否开启 Telegram 评论
siteID = ""      # Telegram Comments Widget Site ID
limit = 5        # 显示数量
height = ""      # 高度
color = ""       # 强调色
colorful = true  # 是否多彩模式
dislikes = false # 是否显示"踩"
outlined = false # 是否显示边框

# Commento comment config (注重隐私的评论系统)
[params.page.comment.commento]
enable = false   # 是否开启 Commento

# Utterances comment config (基于 GitHub Issue，较老，推荐改用 Giscus)
[params.page.comment.utterances]
enable = false   # 是否开启 Utterances
repo = ""        # 仓库名 (格式: owner/repo)
issueTerm = "pathname" # Issue 映射方式 (推荐 pathname)
label = ""       # Issue 标签
lightTheme = "github-light" # 浅色主题
darkTheme = "github-dark"   # 深色主题

# FixIt 0.2.13 | NEW Twikoo comment config (Twikoo 评论，基于腾讯云/Vercel，轻量好用)
# https://twikoo.js.org/
[params.page.comment.twikoo]
enable = false   # 是否开启 Twikoo
envId = ""       # 环境 ID (腾讯云 CloudBase 或 Vercel 地址)
region = ""      # 区域 (腾讯云需要填，Vercel 留空)
path = ""        # 路径 (默认为当前文章路径)
visitor = true   # 是否开启文章阅读量统计
commentCount = true # 是否开启评论数统计
lightgallery = false # 是否启用图片灯箱
katex = false    # 是否启用数学公式支持

# FixIt 0.2.14 | NEW Giscus comments config (基于 GitHub Discussions，目前最流行)
[params.page.comment.giscus]
enable = false   # 是否开启 Giscus (强烈推荐 GitHub 用户使用)
repo = ""        # 仓库全名 (例如 "username/myblog")
repoId = ""      # 仓库 ID (注意：不是名字，是 giscus.app 自动生成的一串字符)
category = ""    # Discussion 分类名 (例如 "Announcements")
categoryId = ""  # Discussion 分类 ID (也是自动生成的字符)
mapping = ""     # 映射方式 (推荐 "pathname")
origin = "https://giscus.app" # Giscus 服务地址 (如果你自建了 Giscus 服务则修改)
strict = "0"     # 是否启用严格匹配
term = ""        # 映射字段 (当 mapping 不为 specific 时留空)
reactionsEnabled = "1" # 是否启用表情回应 (Top reactions)
emitMetadata = "0" # 是否发送页面元数据
inputPosition = "bottom" # 评论框位置 ["top", "bottom"]
lang = ""        # 语言 (留空自动跟随系统)
lightTheme = "light" # 浅色模式主题
darkTheme = "dark"   # 深色模式主题
lazyLoad = true  # 是否延迟加载 (提升页面打开速度)

# Third-party library config (第三方库配置)
# 用于在页面中引入额外的 CSS 或 JS 文件
[params.page.library]

[params.page.library.css]
# someCSS = "some.css"   # 示例: 引入 assets/ 目录下的 CSS 文件 (文件名任意，不重复即可)
