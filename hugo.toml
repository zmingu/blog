# =====================================================================================
# It's recommended to use Alternate Theme Config to configure FixIt
# Modifying this file may result in merge conflict
# There are currently some restrictions to what a theme component can configure:
# params, menu, outputformats and mediatypes
# =====================================================================================

# -------------------------------------------------------------------------------------
# Hugo Configuration (Hugo配置)
# See: https://gohugo.io/getting-started/configuration/
# -------------------------------------------------------------------------------------
title = "Zmingu's Blog"# 网站标题

baseURL = "https://blog.zmingu.com"# 根目录的主机名（和路径）

theme = ["FixIt"] # 主题列表

defaultContentLanguage = "zh-cn" # 确定默认内容语言 ["en", "zh-cn", "fr", "pl", ...],设置站点的默认语言代码，用于多语言支持和内容渲染。

languageCode = "zh-CN" # 语言代码 ["en", "zh-CN", "fr", "pl", ...],站点语言的 ISO 代码，与 defaultContentLanguage 类似，但更精确用于元标签和 i18n（国际化）。


languageName = "简体中文" # 语言名称 ["English", "简体中文", "Français", "Polski", ...],语言的友好名称，用于显示在语言切换器或元数据中。

hasCJKLanguage = true # 是否包含中文/日文/韩文,启用对 CJK（中文、日文、韩文）字符的特殊处理，如断词和排版优化。设置为 true 时，Hugo 会加载相关库，提高东亚语言渲染质量。

copyright = "© 2025 Zmingu. All rights reserved." # 仅用于 SEO 模式的版权描述,版权声明文本，仅用于结构化数据（Schema.org），不会直接显示在页面上。

enableRobotsTXT = true # 是否使用 robots.txt,启用生成 robots.txt 文件，用于搜索引擎爬虫控制（如允许/禁止索引页面）。

enableGitInfo = true # 是否使用 Git 提交日志,启用 Git 信息集成，如在页面中显示最后修改时间（基于 commit）。需要站点仓库是 Git 管理的。设置为 true 时，提升内容时效性显示。当前已启用，推荐保持。

enableEmoji = true # 是否使用表情符号代码，允许 Hugo 解析和渲染 Emoji（如 :smile: 转为 😊）。设置为 true 时，支持 Markdown 中的 Emoji 短码。当前已启用，几乎所有现代站点都推荐。

summaryLength = 10 # 自动生成摘要的字数限制（默认70），设为40让文章列表更简洁

# 站点的主要部分，如果设置，Site 对象的 MainSections 方法将返回指定的部分；否则，返回页面最多的部分。
# 定义站点的“主要”内容部分（如 "posts" 为博客文章目录），用于 RSS、归档页等。当前被注释掉（#），Hugo 会自动选择页面最多的 section（如 content/posts）。如果您的博客有多个部分，取消注释并指定如 mainSections = ["posts", "projects"]。
# mainSections = ["posts"]

# -------------------------------------------------------------------------------------
# Menu Configuration (菜单配置)
# See: https://fixit.lruihao.cn/documentation/basics/#menu-configuration
# -------------------------------------------------------------------------------------
[[menu.main]]
identifier = "Home"
parent = ""
pre = ""
post = ""
name = "主页"
url = "/"
title = ""
weight = 1

[menu.main.params]
icon = "fa-solid fa-home"

[menu]

[[menu.main]]
identifier = "archives"    # 菜单项的唯一 ID，用于主题内部引用或自定义 CSS/JS。建议使用小写英文，避免特殊字符。当前为 "archives"，对应归档页面。
parent = ""                # 指定父菜单项的 identifier，用于创建子菜单。如果为空（""），则为顶级菜单项。当前为空，表示独立顶级项。
# 菜单名称前的额外内容字符串。您可以在名称前添加额外信息（支持 HTML 格式），如图标, pre 参数允许在菜单名称前插入 HTML 内容，如 `<i class="fas fa-home"></i>` 添加图标。
pre = ""
# 菜单名称后的额外内容字符串。您可以在名称后添加额外信息（支持 HTML 格式），如图标, post 参数允许在菜单名称后插入 HTML 内容，如计数器或徽章。
post = ""
name = "归档"
url = "/archives/"
# 标题将在悬停此菜单链接时显示
title = ""
weight = 2 # 菜单排序权重，数字越小越靠前（左侧）。当前为 1，是第一个菜单项。

# FixIt 0.2.14 | 新功能：向菜单项添加用户定义的内容
[menu.main.params]
# 为菜单项添加自定义 CSS 类，用于样式覆盖。
class = ""
# 是否设置为草稿菜单项，其功能类似于草稿文章/页面
draft = false
# FixIt 0.2.16 | 新功能：向特定菜单项添加 FontAwesome 图标
icon = "fa-solid fa-archive"
# FixIt 0.2.16 | 新功能：设置菜单项类型，可选值：["mobile", "desktop"]，指定菜单项仅在移动端（mobile）或桌面端（desktop）显示。为空表示所有设备。
type = ""
# FixIt 0.3.9 | 新功能：是否显示子菜单项分隔线
divided = false

[[menu.main]]
identifier = "categories"
parent = ""
pre = ""
post = ""
name = "分类"
url = "/categories/"
title = ""
weight = 3

[menu.main.params]
icon = "fa-solid fa-folder-tree"

[[menu.main]]
identifier = "tags"
parent = ""
pre = ""
post = ""
name = "标签"
url = "/tags/"
title = ""
weight = 4

[menu.main.params]
icon = "fa-solid fa-tags"

# -------------------------------------------------------------------------------------
# Related content Configuration (相关内容配置)
# See: https://gohugo.io/content-management/related/
# -------------------------------------------------------------------------------------

# 解释如何使用相关内容 API 生成文章推荐。当前配置启用基本匹配逻辑，适合博客使用。
[related]
# 是否在推荐中包含发布时间晚于当前文章的帖子。设置为 false 时，只推荐更早的帖子（避免未来内容影响）。当前为 false，适合时间线博客；
includeNewer = false
# 推荐匹配的最低分数阈值（0-100）。分数基于索引权重计算，只有超过阈值的帖子才被推荐。当前为 80，表示较高相似度，确保推荐质量；如果推荐太少，可降低到 50。
threshold = 80
# 是否将关键词/标签转换为小写进行匹配。设置为 false 时，保持原样匹配（区分大小写）。当前为 false，适合英文标签；如果是多语言站点，可改为 true 以提高匹配率。
toLower = false

# Hugo 使用 `[[related.indices]]` 定义多个匹配索引，每个是一个独立的匹配规则。当前有四个索引，按权重排序。
# 相关索引（第一个：keywords（关键词））
[[related.indices]]
# 是否应用站点级过滤器（如只匹配 published 帖子）。设置为 false 时，不过滤所有内容。当前为 false，包含所有帖子；如果是多作者博客，可启用以过滤。
applyFilter = false
# 索引中唯一项的最小数量阈值。如果低于此值，忽略该索引。0 表示无限制。当前为 0，适合小型站点；大型站点可设为 5 以避免稀疏匹配。
cardinalityThreshold = 0
# 索引名称，对应内容的前沿事项（frontmatter）字段，如 keywords（关键词）。Hugo 会匹配当前文章的 keywords 与其他帖子的。
name = 'keywords'
# 正则表达式模式，用于提取/过滤字段值。为空（''）表示匹配整个字段。当前为空，直接匹配 keywords 数组。
pattern = ''
# 同全局 toLower，此处覆盖。当前为 false。
toLower = false
# 匹配类型：'basic'（基本词频匹配）、'fragments'（片段匹配）。当前为 'basic'，简单高效。
type = 'basic'
# 该索引在总分数中的权重（0-100）。当前为 100，是最高权重，优先匹配关键词。
weight = 100

# 相关索引（第二个：日期）
[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
# 匹配基于发布日期（date 字段）。Hugo 计算时间接近度。
name = 'date'
pattern = ''
toLower = false
type = 'basic'
# 低权重，表示日期匹配辅助作用，不主导推荐。
weight = 10

# 相关索引（第三个：标签）
[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
# 匹配基于标签（tags 字段），Hugo 站点默认 taxonomy。
name = 'tags'
pattern = ''
toLower = false
type = 'basic'
# 高权重，标签是博客常见推荐依据。
weight = 80

# 相关索引（第四个：片段引用）
[[related.indices]]
applyFilter = false
# 匹配基于内容片段引用（fragmentrefs），用于高级内容链接（如内部引用）
name = 'fragmentrefs'
# 'fragments' 类型，专用于片段级匹配，适合长文或知识库。
type = 'fragments'
# 中等高权重，增强内容相关性。
weight = 80

# -------------------------------------------------------------------------------------
# Modules Configuration
# See: https://gohugo.io/hugo-modules/configuration/#module-config-imports
# -------------------------------------------------------------------------------------

[module]

[module.hugoVersion]
extended = true
min = "0.147.7"

# -------------------------------------------------------------------------------------
# Markup related configuration in Hugo
# See: https://gohugo.io/getting-started/configuration-markup/
# -------------------------------------------------------------------------------------

# 这是 Markup（标记语言渲染）配置
[markup]
# Hugo 使用 Chroma 库高亮代码块
# Syntax Highlighting (https://gohugo.io/content-management/syntax-highlighting)
[markup.highlight]
# ######### necessary configurations ##########
# https://github.com/hugo-fixit/FixIt/issues/43
# 这些是 FixIt 主题必需的设置（见 GitHub issue #43），确保代码块正确显示行号和样式。未设置可能导致主题渲染问题。

# 启用 Markdown 代码围栏（fences，如 ```），允许语法高亮。设置为 true 时，Hugo 自动检测语言。当前为 true，标准启用。
codeFences = true
# 为代码块添加行号显示。设置为 true 时，每行代码左侧显示数字。当前为 true，适合技术博客。
lineNos = true
# 将行号渲染为表格格式（更美观）。与 lineNos 结合使用。当前为 true，FixIt 主题推荐。
lineNumbersInTable = true
# 是否避免添加 CSS 类到高亮代码（false 表示添加类，便于自定义样式）。当前为 false，允许主题 CSS 覆盖颜色/字体。
noClasses = false
# ######### necessary configurations ##########
guessSyntax = true

# Goldmark 是 Hugo 0.60 起 Markdown 的默认库
# https://gohugo.io/getting-started/configuration-markup/#goldmark
[markup.goldmark]
# 是否复制重复的资源文件（如图像）。设置为 false 时，避免冗余。当前为 false，优化构建。
duplicateResourceFiles = false

[markup.goldmark.extensions]
# 支持 Markdown 定义列表（术语: 定义）。当前为 true，增强语义内容。
definitionList = true
# 启用脚注支持（如 [^1]）。当前为 true，适合学术/博客引用。
footnote = true
# 自动将纯文本 URL 转为超链接。当前为 true，提高可读性。
linkify = true
# 链接化时默认协议（http/https）。当前为 'https'，安全优先。
linkifyProtocol = 'https'
# 是否启用删除线（~~text~~）。当前为 false，避免意外渲染；如果需要，可改为 true。
strikethrough = false
# 支持 Markdown 表格语法
table = true
# 支持复选框任务列表（如 - [x] 完成）。当前为 true，适合笔记/教程。
taskList = true
# 智能替换引号、破折号等为排版符号（如 " → “”）。当前为 true，提升专业外观。
typographer = true

# https://gohugo.io/getting-started/configuration-markup/#extras
[markup.goldmark.extensions.extras]

# 配置删除标签支持。启用 <del> 标签（删除线）
[markup.goldmark.extensions.extras.delete]
enable = true

# 配置插入标签支持。启用 <ins> 标签（插入强调）。
[markup.goldmark.extensions.extras.insert]
enable = true

# 配置高亮标记支持。启用 <mark> 标签（背景高亮）
[markup.goldmark.extensions.extras.mark]
enable = true

# 配置下标支持。启用 <sub> 标签（如 H₂O）。
[markup.goldmark.extensions.extras.subscript]
enable = true

# 配置上标支持。启用 <sup> 标签（如 x²）。
[markup.goldmark.extensions.extras.superscript]
enable = true

# Passthrough 扩展，将特定分隔符内容直接传递给模板（不解析 Markdown），用于嵌入 LaTeX 等。支持数学公式。
# https://gohugo.io/content-management/mathematics/
[markup.goldmark.extensions.passthrough]
enable = true

# 定义块级（block）和内联（inline）公式的分隔符。
# 块级公式分隔符数组。第一个是 \[ ... \]（显示数学），第二个是 $$ ... $$（行内/块）。支持 MathJax 渲染。
# 内联公式分隔符。第一个是 \( ... \)（内联数学），第二个是 $ ... $（简短内联）。当前配置覆盖常见 LaTeX 语法。
[markup.goldmark.extensions.passthrough.delimiters]
block = [
  [
    '\[',
    '\]'
  ],
  [
    '$$',
    '$$'
  ]
]
inline = [
  [
    '\(',
    '\)'
  ],
  [
    '$',
    '$'
  ]
]

[markup.goldmark.parser]
# 允许在 Markdown 元素中添加 HTML 属性。
[markup.goldmark.parser.attribute]
# 启用块级元素（如图像、链接）的自定义属性（如 id/class）
block = true
# 启用图像/链接的 title 属性（悬停提示）。
title = true

[markup.goldmark.renderer]
# 是否将软换行转为硬 <br>。设置为 false 时，保持 Markdown 自然换行。当前为 false，默认推荐。
hardWraps = false
# 允许 Markdown 中嵌入原始 HTML 标签。
unsafe = true
# 是否输出 XHTML 格式（自闭合标签如 <br />）。设置为 false 时，使用 HTML5。当前为 false，现代标准。
xhtml = false

# -------------------------------------------------------------------------------------
# Sitemap Configuration
# See: https://gohugo.io/templates/sitemap/#configuration
# -------------------------------------------------------------------------------------

[sitemap]
# 页面更新的预期频率，用于 sitemap 中的 <changefreq> 标签。选项："always"、"hourly"、"daily"、"weekly"、"monthly"、"yearly"、"never"。当前为 "weekly"（每周），适合博客；如果是静态站点，可改为 "monthly"。
changefreq = "weekly"
# 是否禁用 sitemap 生成。
disable = false
# sitemap 输出文件名。
filename = "sitemap.xml"
# 页面在 sitemap 中的相对优先级（0.0-1.0）。1.0 为最高（首页常用），0.0 为最低。当前为 0.5（中等），全局应用；可通过 frontmatter 覆盖特定页面。
priority = 0.5

# -------------------------------------------------------------------------------------
# Permalinks Configuration 永久链接配置
# See: https://gohugo.io/content-management/urls/#permalinks
# -------------------------------------------------------------------------------------

[permalinks]

[permalinks.page]
# 为 posts 页面设置 URL 如 /p/my-post（:slugorcontentbasename 是文件名或 slug）。当前未启用，使用默认 /page-name/。取消注释可自定义简短 URL。
# posts = "/p/:slugorcontentbasename"
[permalinks.section]
# section "posts" 的帖子 URL 如 /posts/my-post。当前未启用，使用默认 /section/post-name/。适合博客时启用。
# posts = "/posts/:slugorcontentbasename"
[permalinks.taxonomy]
# 配置 taxonomy（如 tags/categories）的列表页 URL。当前为空，使用默认 /tags/ 等。
[permalinks.term]
# 配置 taxonomy term（如具体标签）的 URL。当前为空，使用默认 /tags/my-tag/。

# -------------------------------------------------------------------------------------
# Privacy Configuration
# See: https://gohugo.io/about/hugo-and-gdpr/
# -------------------------------------------------------------------------------------

[privacy]

[privacy.x]
# 启用 Do Not Track 头，请求 X 不跟踪用户。设置为 true 时，增强隐私。当前为 true，推荐用于欧盟用户。
enableDNT = true

[privacy.youtube]
# 使用 YouTube 的隐私增强模式（noscript 嵌入，不加载跟踪脚本，直到用户交互）。设置为 true 时，视频先显示缩略图，点击再加载。当前为 true，符合 GDPR；false 则全加载。
privacyEnhanced = true

# -------------------------------------------------------------------------------------
# 媒体类型配置
# 参考：https://gohugo.io/templates/output-formats/#media-types
# -------------------------------------------------------------------------------------

[mediaTypes]
# 为 JSON feed 定义媒体类型。取消注释可启用 JSON 格式的 RSS 输出。后缀 = ["json"]：指定文件后缀为 .json，用于输出如 feed.json 文件。
# [mediaTypes."application/feed+json"]
#   suffixes = ["json"]

# -------------------------------------------------------------------------------------
# 输出格式定义配置
# 参考：https://gohugo.io/templates/output-formats/#output-format-definitions
# -------------------------------------------------------------------------------------

[outputFormats]

# FixIt 0.3.0 | 新功能：生成 /archives/index.html 文件的选项
[outputFormats.archives]
path = "archives"              # 路径 = "archives"：输出文件的相对路径，生成 public/archives/index.html。
baseName = "index"             # 基础名称 = "index"：输出文件的基础名称（无扩展），结合 path 生成 index.html。
mediaType = "text/html"        # 媒体类型 = "text/html"：MIME 类型，指定为 HTML 输出。
isPlainText = false            # 纯文本 = false：是否为纯文本（无 HTML 标签），false 表示 HTML 渲染。
isHTML = true                  # HTML = true：是否为 HTML 输出，true 表示启用 HTML。
permalinkable = true           # 可永久链接 = true：是否生成 URL 链接，true 支持 /archives/ 访问。
notAlternative = true          # 非备选 = true：作为主要输出格式，避免多版本冲突。

# FixIt 0.3.0 | 新功能：生成 /offline/index.html 文件的选项
[outputFormats.offline]
path = "offline"               # 路径 = "offline"：输出路径，生成 public/offline/index.html。
baseName = "index"             # 基础名称 = "index"：基础名称，生成 index.html。
mediaType = "text/html"        # 媒体类型 = "text/html"：MIME 类型为 HTML。
isPlainText = false            # 纯文本 = false：非纯文本，HTML 渲染。
isHTML = true                  # HTML = true：启用 HTML 输出。
permalinkable = true           # 可永久链接 = true：支持 URL 访问。
notAlternative = true          # 非备选 = true：主要输出格式。

# FixIt 0.3.0 | 新功能：生成 readme.md 文件的选项
[outputFormats.readme]
baseName = "readme"            # 基础名称 = "readme"：生成 public/readme.md 文件。
mediaType = "text/markdown"
isPlainText = true
isHTML = false
notAlternative = true

# FixIt 0.3.0 | 修改：生成 baidu_urls.txt 文件的选项
[outputFormats.baidu_urls]
baseName = "baidu_urls"        # 基础名称 = "baidu_urls"：生成 public/baidu_urls.txt 文件。
mediaType = "text/plain"
isPlainText = true
isHTML = false
notAlternative = true

# FixIt 0.3.10 | 新功能：生成 search.json 文件的选项
[outputFormats.search]
baseName = "search"             # 基础名称 = "search"：生成 public/search.json 文件。
mediaType = "application/json"
rel = "search"
isPlainText = true
isHTML = false
permalinkable = true

# -------------------------------------------------------------------------------------
# 自定义输出格式配置
# 参考：https://gohugo.io/templates/output-formats/#customizing-output-formats
# -------------------------------------------------------------------------------------
# Hugo 输出文件的选项，可选值如下：
# home = ["html", "rss", "archives", "offline", "readme", "baidu_urls", "search"]
# page = ["html", "markdown"]
# section = ["html", "rss"]
# taxonomy = ["html"]
# term = ["html", "rss"]

[outputs]

home = [
  "html", # HTML：生成站点首页的 HTML 输出。
  "rss", # RSS：生成首页 RSS 订阅文件。
  "archives", # archives：生成归档页输出（如 /archives/index.html）。
  "offline", # offline：生成离线页输出（如 /offline/index.html，用于 PWA）。
  "search" # search：生成搜索索引文件（如 search.json）。
]

page = [
  "html", # HTML：生成单个页面的 HTML 输出。
  "markdown" # markdown：生成页面的 Markdown 输出（如用于导出）。
]

section = [
  "html", # HTML：生成部分（如 posts）的 HTML 输出。
  "rss" # RSS：生成部分 RSS 订阅。
]

taxonomy = [ "html" ] # HTML：生成分类法（如 tags）的 HTML 输出列表。

term = [
  "html", # HTML：生成术语（如具体标签）的 HTML 输出。
  "rss" # RSS：生成术语 RSS 订阅。
]

# -------------------------------------------------------------------------------------
# Taxonomies Configuration 分类法配置
# 参考：https://gohugo.io/content-management/taxonomies/#configure-taxonomies
# -------------------------------------------------------------------------------------
[taxonomies]
category = "categories"     # 类别 = "categories"：将默认 category 映射到 "categories" 字段，用于内容分类（如文章类别）。
tag = "tags"                # 标签 = "tags"：将默认 tag 映射到 "tags" 字段，用于内容标签（如文章标签）。
collection = "collections"  # 集合 = "collections"：自定义分类法，将 collection 映射到 "collections" 字段，用于内容集合分组。

# -------------------------------------------------------------------------------------
# 主题核心配置
# 参考：https://fixit.lruihao.cn/documentation/basics/#theme-configuration
# -------------------------------------------------------------------------------------

[params]
# FixIt 0.2.15 | 修改：FixIt 主题版本
version = "0.3.X"  # 版本 = "0.3.X"：指定 FixIt 主题版本，例如 "0.2.X"、"0.2.15"、"v0.2.15" 等，用于兼容性和更新检查。

description = "振明的技术博客 - 分享虚幻引擎(UE5)游戏开发、VR/AR开发实战经验，以及C++编程技巧和日常开发心得。专注于游戏开发领域的技术笔记与教程分享。"   # 描述 = ""：站点描述，用于 SEO 元标签和 Open Graph。

keywords = ["虚幻", "虚幻引擎", "UE", "UE4", "UE5", "Unreal", "游戏开发", "VR开发"]      # 关键词 = []：站点关键词数组，用于 SEO 元标签。

defaultTheme = "auto" # 默认主题 = "auto"：站点默认主题模式，选项 ["light", "dark", "auto"]，auto 根据用户系统自动切换。

fingerprint = ""      # 指纹 = ""：用于 SRI（子资源完整性）的哈希函数，空值表示不使用 SRI，选项 ["sha256", "sha384", "sha512", "md5"]。

dateFormat = "2006-01-02" # 日期格式 = "2006-01-02"：站点日期显示格式，使用 Go 时间格式字符串。

images = []               # 图像 = []：站点图像数组，用于 Open Graph 和 Twitter Cards 的默认图片。

# FixIt 0.2.12 | 新功能：启用 PWA
enablePWA = true # 启用 PWA = true：是否启用渐进式 Web 应用（PWA）功能，支持离线访问和安装。

# FixIt 0.2.14 | 新功能：是否自动为外部链接添加外部图标
externalIcon = true # 外部图标 = false：是否自动为外部链接添加图标（如外部链接指示符）。

# FixIt 0.3.13 | 新功能：是否大写标题
capitalizeTitles = false # 大写标题 = true：是否将标题首字母大写显示。

# FixIt 0.3.0 | 新功能：是否将站点标题添加到每个页面的标题中
# 请记住在 hugo.toml 中设置站点标题（例如 title = "title"）
withSiteTitle = true # 带站点标题 = true：是否将站点标题添加到每个页面的 <title> 中。

# FixIt 0.3.0 | 新功能：当站点标题添加到每个页面的标题时使用的标题分隔符
titleDelimiter = "|" # 标题分隔符 = "-"：页面标题中站点标题的分隔符，如 "页面标题 - 站点标题"。

# FixIt 0.3.0 | 新功能：是否将站点副标题添加到首页标题中
# 请记住通过 params.header.subtitle.name 设置站点副标题
indexWithSubtitle = true # 首页带副标题 = false：是否将站点副标题添加到首页的 <title> 中。

# FixIt 0.3.13 | 新功能：是否以纯文本显示摘要
summaryPlainify = true # 摘要纯文本 = false：是否将摘要转换为纯文本（去除 HTML 标签）。

# FixIt 0.4.0 | 新功能：是否启用从其他语言合并缺失翻译
# 设置为 true 时，缺失翻译将从其他语言合并并显示
# 默认 false 以提高性能，尤其适合单语言站点
# 如果站点有多语言且希望显示所有内容，请设置为 true
enableTranslationMerge = false # 启用翻译合并 = false：是否合并多语言中缺失的翻译内容。

# FixIt 0.2.14 | 新功能：FixIt 默认仅在首页 HTML head 中注入主题元标签。
# 您可以关闭它，但我们非常希望您不要关闭，因为这是观察 FixIt 受欢迎程度的好方法。
disableThemeInject = false # 禁用主题注入 = false：是否禁用首页 head 中的主题元标签注入。

# 作者配置
[params.author]
name = "振明" # 建议：填您的真实姓名或笔名，用于文章作者显示和 SEO（必填，避免默认空值）。
email = "zmingu@126.com" # 邮箱 = ""：作者电子邮件，用于联系表单或 Gravatar 关联（可选，注意隐私）。
link = "https://blog.zmingu.com" # 链接 = ""：作者个人链接，如个人网站、GitHub 或 Twitter URL。
avatar = "/images/avatar.webp" # 头像 = ""：作者头像 URL 或相对路径（如 /images/avatar.jpg），用于文章和侧边栏显示。

# FixIt 0.3.0 | 新功能：公开 Git 仓库信息，仅当 enableGitInfo 为 true 时生效
[params.gitInfo]
# e.g. "https://github.com/hugo-fixit/docs"
repo = "https://github.com/zmingu/blog" # 用于显示 编辑/问题链接。
branch = "master" # 分支 = "main"：仓库默认分支，通常为 "main" 或 "master"，用于生成源文件链接。
dir = "content" # 目录 = "content"：内容目录相对于仓库根目录的路径，通常为 "content"（Hugo 默认）。
# 问题模板 = "..."：报告文章问题的 GitHub Issue 模板，支持参数 {title}（标题）、{URL}（页面 URL）、{sourceURL}（源文件 URL），用于预填表单。
issueTpl = "title=[BUG]%20{title}&body=|Field|Value|%0A|-|-|%0A|Title|{title}|%0A|URL|{URL}|%0A|Filename|{sourceURL}|"

# App 图标配置（控制浏览器标签页图标、添加到手机主屏幕的图标等）
[params.app]
# 当用户将你的博客“添加到主屏幕”时显示的名称
# 建议简短有力，比如 "我的博客" 或你的名字
title = "振明的博客"
# 是否隐藏 favicon 资源链接
# 保持默认 false 即可，否则浏览器标签页就没有图标了
noFavicon = false

# 现代 SVG 格式的 favicon，用于替代旧的 .png 和 .ico
# 如果你有 svg 格式的 Logo，填在这里，例如 "/images/logo.svg"
# Safari 浏览器“固定标签页”(Pinned Tab) 时的单色图标颜色
svgFavicon = ""

# 建议改成你博客的主色调
iconColor = "#5bbad5"
# Windows 8/10/11 开始菜单磁贴的背景颜色
tileColor = "#da532c"

# FixIt 0.2.12 | CHANGED Android 浏览器的主题颜色
# 这会改变手机浏览器顶部的地址栏颜色，使其与网页融为一体
[params.app.themeColor]
light = "#f8f8f8" # 浅色模式下的地址栏颜色（通常保持默认，或微调）
dark = "#252627"  # 深色模式下的地址栏颜色

# 搜索配置
[params.search]

enable = true # 是否开启搜索功能 (建议改为 true)

type = "fuse" # 搜索引擎类型 ["algolia", "fuse", "cse", "post-chat"],推荐初学者使用 "fuse" (本地模糊搜索)，无需注册第三方服务

contentLength = 2000# 文章内容索引的最大长度,设为 2000 足够搜索匹配，减少索引文件体积

placeholder = "搜索文章标题或内容..." # 搜索框的占位符文本 (例如: "搜索文章标题或内容...")

maxResultLength = 10 # 搜索结果显示的最大条数

snippetLength = 30 # 搜索结果中显示的摘要/片段长度 (字符数)

highlightTag = "em" # 搜索关键词高亮的 HTML 标签,默认 "em" 通常会显示为斜体或主题定义的高亮色，保持默认即可

absoluteURL = false # 是否在搜索索引中使用绝对路径 (包含域名),设为 false 即可，使用相对路径更灵活

# Algolia 搜索配置 (第三方强大的搜索服务),如果你文章非常多(几千篇)且追求极致速度，才需要去 algolia.com 注册
[params.search.algolia]
index = ""
appID = ""
searchKey = ""

# Fuse.js 搜索配置 (本地搜索，推荐),文档: https://fusejs.io/api/options.html
[params.search.fuse]
isCaseSensitive = false # 是否区分大小写 (false = 搜 "Hugo" 能搜到 "hugo")
minMatchCharLength = 2  # 最小匹配字符长度 (输入几个字才开始搜)
findAllMatches = false  # 是否查找所有匹配项 (false = 找到一个就停止，性能更好)
location = 0            # 匹配位置 (0 表示从开头开始匹配)
threshold = 0.3 # 匹配阈值 (0.0: 完全精确匹配, 1.0: 只要有字母一样就匹配),0.3 是一个比较平衡的值，既能容错又不会搜出一堆无关内容
distance = 100 # 匹配距离 (决定了多远的字符被认为是匹配的)
ignoreLocation = false # 是否忽略匹配位置 (true = 关键词在文章任何位置都一样重要)
useExtendedSearch = false # 是否使用扩展搜索模式 (支持一些特殊符号语法)
ignoreFieldNorm = false # 是否忽略字段规范化 (通常 false)

# 谷歌/必应 自定义搜索引擎 (CSE)
# 这种方式会跳转或在页面嵌入 Google/Bing 的搜索结果，有广告且体验不如 Fuse 原生
[params.cse]
engine = ""  # 搜索引擎选择: ["google", "bing"]

resultsPage = "/search/" # 搜索结果展示页面的路径

# Google 自定义搜索配置
# https://programmablesearchengine.google.com/
[params.cse.google]
  cx = ""  # 填入你的 Google CSE ID

# Bing 自定义搜索 (FixIt 目前暂未完全支持/已废弃)
[params.cse.bing]

# 页眉 (Header) 基础配置
[params.header]

desktopMode = "auto" # 桌面端页眉模式 ["sticky" (始终固定在顶部), "normal" (随页面滚动消失), "auto" (上滑显示，下滑隐藏)]推荐使用 "auto" 以增加阅读空间，或者 "sticky" 方便导航

mobileMode = "auto"  # 移动端屏幕小，强烈推荐 "auto", 移动端页眉模式 ["sticky", "normal", "auto"]

# Header title config (页眉标题配置)
[params.header.title]
logo = "/images/avatar.webp"    # Logo 图片路径 (如 "/images/logo.png")，文件需放在 static 目录下
name = ""    # 标题名称，留空则默认使用 hugo.toml 顶部的 title
pre = ""     # 标题前的内容(支持HTML)，例如 "<i class='fa-solid fa-blog'></i> " 添加图标
post = ""    # 标题后的内容(支持HTML)，通常留空
typeit = false # 标题是否开启打字机动画(逐字显示)，标题较长时建议 false

[params.header.subtitle]
name = ""    # 副标题名称 (显示在标题下方或旁边)
typeit = false # 副标题是否开启打字机动画

# 面包屑导航配置
[params.breadcrumb]
enable = true # 是否显示面包屑导航 (强烈建议 true，利于 SEO 和用户体验)
sticky = false # 是否在滚动时固定面包屑栏 (一般 false 即可)
showHome = true # 是否在面包屑首位显示 "首页" 链接 (建议 true)
separator = "/" # 面包屑分隔符 (如 ">", "/", "|")
capitalize = true # 是否自动将路径中的单词首字母大写

# 文章底部 上一篇/下一篇 导航
[params.navigation]
inSection = true # 是否限制在同分类下切换 (true = 只有同类文章才互跳，防止技术文跳到生活文)
reverse = false   # 是否反转顺序 (默认: 左边是上一篇/旧，右边是下一篇/新)

# Footer config (页脚配置)
[params.footer]
enable = true    # 是否显示页脚
copyright = true # 是否显示版权信息 (例如 © 2024)
author = true    # 是否显示作者名字 (读取 hugo.toml 顶部的 author 配置)
since = "2020"       # 网站成立年份 (若填 2020，今年是 2024，则显示 "2020 - 2024")
gov = ""         # 公安联网备案信息 (仅中国大陆需要，支持 HTML，如 "<a href='...'>备案号</a>")
icp = ""         # ICP 备案信息 (仅中国大陆需要，支持 HTML)
license = ""     # 许可协议信息 (支持 HTML，例如 '<a href="...">CC BY-NC-SA 4.0</a>')

# 是否显示 "Powered by Hugo & FixIt
[params.footer.powered]
enable = false    # 是否开启推广信息显示
hugoLogo = false  # 是否显示 Hugo 的 Logo 小图标
themeLogo = false # 是否显示 FixIt 主题的 Logo 小图标

# 网站运行时间统计
[params.footer.siteTime]
enable = true   # 是否在页脚显示 "网站已运行 XX 天" (建议开启，很有成就感)
animate = true   # 是否开启秒数的跳动动画
icon = "fa-solid fa-heartbeat" # 运行时间前的图标 (默认是心跳)
pre = "已运行:"         # 时间前的描述文字 (例如 "博客已运行:")
value = "2020-01-01T16:15:22+08:00"       # 网站建站时间，必须严格按照此格式填写: "2021-12-18T16:15:22+08:00"

# 页脚各组件的排序: ["first", 0, 1, 2, 3, 4, 5, "last"]
[params.footer.order]
powered = "last"      # "Powered by" 信息的排序权重 (数值越小越靠前)
copyright = 0    # 版权信息的排序权重
statistics = 0   # 站点统计(字数等)的排序权重
visitor = 0      # 访客统计(不蒜子等)的排序权重
beian = 0        # ICP/公安备案信息的排序权重

# 归档页面配置，即 /archives/ 页面
[params.archives]
paginate = 20    # 归档页面每页显示的文章数量 (归档页通常列表较紧凑，可以设大一点)
dateFormat = "01-02" # 归档列表日期的格式 ("01-02" 代表只显示 月-日，因为年份已在分组标题显示)

# Section 页面配置，即 /posts/ 或 /docs/ 这种一级目录页
[params.section]
paginate = 20        # 每页显示的文章数量 (超过则翻页)
dateFormat = "01-02" # 日期显示格式 (只显示 月-日，年份通常在分组标题中)

# Section 的 RSS/Atom/JSON 订阅配置
[params.section.feed]
limit = 20       # Feed 中包含的文章数量 (-1 代表全部，建议设置一个具体数字如 20 以减小文件体积)
fullText = false # Feed 中是否包含全文 (false=只含摘要; true=包含全文，利于RSS阅读器但易被爬虫抓取)

# 分类或标签列表页配置
[params.list]
paginate = 20        # 每页显示的文章数量
dateFormat = "01-02" # 日期显示格式

# 分类或标签的 RSS 订阅配置
[params.list.feed]
limit = -1       # Feed 中包含的文章数量
fullText = false # Feed 中是否包含全文

# 最近更新文章列表配置
[params.recentlyUpdated]
archives = true  # 是否在“归档”页显示最近更新的文章
section = true   # 是否在“Section”页显示最近更新的文章
list = true      # 是否在“分类/标签”页显示最近更新的文章
days = 30        # 判定为“最近更新”的时间范围 (天数)
maxCount = 10    # 最多显示多少篇最近更新的文章

# 标签云配置，用于 /tags/ 页面
[params.tagcloud]
enable = true   # 是否开启标签云 (建议 true，在标签页显示大小不一的彩色标签，很美观)
min = 14         # 标签最小字体大小 (px)
max = 32         # 标签最大字体大小 (px)
peakCount = 10   # 达到最大字体大小所需的文章数量 (文章数 >= 10 的标签会显示为最大号字体)
orderby = "name" # 标签排序方式 ["name"(按名称排序), "count"(按文章数量排序)]

# 主页配置
[params.home]

# 主页个人信息区配置
[params.home.profile]
enable = true            # 是否显示主页个人简介 (建议 true，否则主页只有文章列表)
gravatarEmail = ""       # Gravatar 头像邮箱 (若填了 avatarURL，此项失效)
avatarURL = "/images/avatar.webp" # 主页头像链接 (如 "/images/avatar.png"，文件放 static 下)
avatarMenu = ""          # 点击头像跳转的链接 (留空默认跳到关于页，或填 "/about/")
title = "振明"               # 主页大标题 (支持 HTML，例如 "你好，我是 <b>Tom</b>")
subtitle = "闻者愿喜"            # 主页副标题 (支持 HTML)
typeit = true            # 副标题是否开启打字机动画 (酷炫效果，建议开启)
social = true            # 是否在个人简介下方显示社交图标 (读取下方 params.social 的配置)
disclaimer = ""          # 免责声明或额外文字 (显示在社交图标下方)

# 主页文章列表配置
[params.home.posts]
enable = true           # 关闭首页文章列表，只显示个人信息
paginate = 6             # 主页每页显示的文章数量 (建议 6-10 篇)

