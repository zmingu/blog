[params.page.library.js]
# someJavascript = "some.js" # 示例: 引入 assets/ 目录下的 JS 文件
# located in "assets/"
# Or
# someJavascript = "https://cdn.example.com/some.js" # 示例: 引入远程 CDN JS 链接

# Page SEO config (页面级 SEO 配置)
[params.page.seo]
# image URL
images = []      # 页面特定的 SEO 图片列表 (优先级高于全局 SEO 图片，用于社交媒体分享预览)

# Publisher info (发布者信息，用于 Google 结构化数据 Schema)
[params.page.seo.publisher]
